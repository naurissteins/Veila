# Wallpaper: https://www.vecteezy.com/vector-art/39886274-sunset-beach-wallpaper-background-illustration
# Font: https://www.1001fonts.com/mail-ray-stuff-font.html
[background]
mode = "file"
path = "/path/to/wallpaper.jpg"
color = "#494732"
dim_strength = 0

[lock]
user_hint = "Password"
show_username = false

[battery]
enabled = true

[weather]
enabled = false

[visuals.clock]
format = "24h"
meridiem_size = 3
meridiem_offset_x = 6
meridiem_offset_y = 7
font_family = "Mail Ray Stuff"
font_weight = 400
color = "rgba(255, 255, 255, 0.4)"
size = 24
halign = "center"
valign = "top"
x = 0
y = 40

[visuals.date]
font_family = "Mail Ray Stuff"
font_weight = 400
color = "rgba(255, 255, 255, 0.4)"
size = 7
halign = "center"
valign = "top"
x = 0
y = 176

[visuals.input]
background_color = "rgba(255, 255, 255, 0.02)"
border_color = "rgba(255, 255, 255, 0.08)"
border_width = 3
width = 310
height = 54
radius = 50
mask_color = "#ffffff"
font_family = "Google Sans Flex"
font_weight = 400
font_size = 16

[visuals.status]
rejected_color = "#FFD5D5"
pending_color = "#ECECEC"

[visuals.placeholder]
color = "rgba(255, 255, 255, 0.6)"

[visuals.eye]
color = "rgba(255, 255, 255, 0.72)"

[visuals.caps_lock]
color = "rgba(255, 255, 255, 0.52)"

[visuals.avatar]
enabled = false
size = 192
background_color = "rgba(255, 255, 255, 0.06)"
placeholder_padding = 28
icon_color = "#ffffff"

[visuals.username]
font_family = "Google Sans Flex"
font_weight = 400
color = "rgba(255, 255, 255, 0.84)"
font_size = 28

[visuals.keyboard]
background_size = 46
background_color = "rgba(255, 255, 255, 0.05)"
color = "rgba(255, 255, 255, 0.68)"
size = 2
halign = "right"
valign = "top"
x = -24
y = 17

[visuals.battery]
background_color = "rgba(255, 255, 255, 0.05)"
background_size = 46
color = "rgba(255, 255, 255, 0.68)"
size = 20
halign = "right"
valign = "top"
x = -78
y = 17

[visuals.weather.icon]
size = 40
opacity = 80
halign = "left"
valign = "bottom"
x = 30
y = -112

[visuals.weather.temperature]
font_size = 6
font_family = "Nunito"
font_weight = 800
font_style = "italic"
letter_spacing = 0
color = "rgba(255, 255, 255, 0.73)"
halign = "left"
valign = "bottom"
x = 30
y = -66

[visuals.weather.location]
font_size = 3
font_family = "Google Sans Flex"
font_weight = 400
color = "rgba(214, 227, 255, 0.58)"
halign = "left"
valign = "bottom"
x = 30
y = -34


[visuals.now_playing]
enabled = false
fade_duration_ms = 320

[visuals.now_playing.artwork]
enabled = true
size = 44
radius = 8
opacity = 90
halign = "right"
valign = "bottom"
x = -384
y = -48

[visuals.now_playing.artist]
width = 318
color = "rgba(255, 255, 255, 0.39)"
font_family = "Google Sans Flex"
font_size = 2
font_weight = 400
halign = "right"
valign = "bottom"
x = -48
y = -80

[visuals.now_playing.title]
width = 318
color = "rgba(255, 255, 255, 0.69)"
font_family = "Google Sans Flex"
font_size = 2
font_weight = 400
halign = "right"
valign = "bottom"
x = -48
y = -48
