[background]
mode = "radial"
# path = "/path/to/wallpaper.jpg"
color = "#403249"
dim_strength = 0

[background.radial]
center = "#cba6f7"
edge = "#1F1B2E"
center_x = 50
center_y = 50
radius = 80

[battery]
enabled = true

[weather]
enabled = false

[visuals.clock]
format = "24h"
meridiem_font_size = 22
meridiem_x = 6
meridiem_y = 7
font_family = "Geom"
font_weight = 600
color = "rgba(203, 166, 247, 1.0)"
font_size = 90
halign = "center"
valign = "bottom"
x = 0
y = -150
relative_to = "auth"

[visuals.date]
format = "long"
font_family = "Geom"
font_weight = 600
font_size = 18
color = "#94e2d5"
halign = "center"
valign = "bottom"
x = 0
y = -120
relative_to = "auth"

[visuals.input]
placeholder = "Password"
background_color = "rgba(255, 255, 255, 0.04)"
width = 360
height = 54
radius = 10
mask_color = "#ffffff"
font_family = "Google Sans Flex"
font_weight = 400
font_size = 16
halign = "center"
valign = "bottom"
x = 0
y = -30
relative_to = "auth"

[visuals.status]
mode = "inline"
rejected_color = "rgba(255, 213, 213, 0.98)"
pending_color = "rgba(236, 236, 236, 0.88)"

[visuals.eye]
color = "rgba(255, 255, 255, 0.72)"

[visuals.caps_lock]
color = "rgba(255, 255, 255, 0.52)"

[visuals.placeholder]
color = "rgba(255, 255, 255, 0.9)"

[visuals.avatar]
# image_path = "/path/to/avatar.jpg"
radius = 10
size = 360
background_color = "rgba(255, 255, 255, 0.04)"
placeholder_padding = 28
halign = "center"
valign = "center"
x = 0
y = -115

[visuals.username]
enabled = false
font_family = "Google Sans Flex"
font_weight = 400
color = "rgba(255, 255, 255, 0.84)"
font_size = 28
halign = "center"
valign = "center"
x = 0
y = 0
relative_to = "username"

[visuals.keyboard]
background_size = 0
color = "#f5c2e7"
size = 30
halign = "center"
valign = "center"
x = 0
y = 0
relative_to = "keyboard"

[visuals.battery]
background_size = 0
color = "#a6e3a1"
size = 40
halign = "center"
valign = "center"
x = 0
y = 0
relative_to = "battery"

[visuals.weather.icon]
size = 60
opacity = 100
halign = "center"
valign = "center"
x = 0
y = 0
relative_to = "weather_icon"

[visuals.weather.temperature]
font_size = 30
font_family = "Geom"
font_weight = 600
letter_spacing = 0
color = "#f9e2af"
halign = "center"
valign = "center"
x = 0
y = 0
relative_to = "weather_temperature"

[visuals.weather.location]
enabled = false

[visuals.now_playing]
enabled = true
fade_duration_ms = 320

[visuals.now_playing.artwork]
size = 175
radius = 8
opacity = 100
halign = "center"
valign = "center"
x = 0
y = 0
relative_to = "now_playing_artwork"

[visuals.now_playing.artist]
width = 318
color = "#a6e3a1"
font_family = "Google Sans Flex"
font_size = 20
font_weight = 400
halign = "left"
valign = "top"
x = 20
y = 23
relative_to = "now_playing_artist_title"

[visuals.now_playing.title]
width = 600
color = "#74c7ec"
font_family = "Google Sans Flex"
font_size = 23
font_weight = 400
halign = "left"
valign = "bottom"
x = 20
y = -23
relative_to = "now_playing_artist_title"

