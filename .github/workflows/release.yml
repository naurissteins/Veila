name: release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the packaged artifact"
        required: false
        default: "manual"
      artifact_name:
        description: "Artifact name for manual packaging test uploads"
        required: false
        default: "veila-release-preview"

permissions:
  contents: write

jobs:
  linux:
    name: linux-${{ matrix.artifact_arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_arch: x86_64-linux
            deb_arch: amd64
            rpm_arch: x86_64
            runner: ubuntu-latest
          - artifact_arch: aarch64-linux
            deb_arch: arm64
            rpm_arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dpkg-dev \
            pkg-config \
            libpam0g-dev \
            rpm \
            libwayland-dev \
            libxkbcommon-dev

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-rust-cache-${{ matrix.artifact_arch }}

      - name: Build optimized release
        run: cargo build --locked --release --workspace

      - name: Show release binary sizes
        shell: bash
        run: |
          set -euxo pipefail
          ls -lh \
            target/release/veila \
            target/release/veilad \
            target/release/veila-curtain

      - name: Package release tarball
        shell: bash
        run: |
          set -euxo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          dist_dir="dist/veila-${version}-${{ matrix.artifact_arch }}"

          rm -rf "$dist_dir"
          mkdir -p \
            "$dist_dir/bin" \
            "$dist_dir/share/man/man1" \
            "$dist_dir/share/veila"

          install -m755 target/release/veila "$dist_dir/bin/veila"
          install -m755 target/release/veilad "$dist_dir/bin/veilad"
          install -m755 target/release/veila-curtain "$dist_dir/bin/veila-curtain"
          install -m644 docs/man/veila.1 "$dist_dir/share/man/man1/veila.1"
          cp -R assets/fonts "$dist_dir/share/veila/"
          cp -R assets/icons "$dist_dir/share/veila/"
          cp -R assets/systemd "$dist_dir/share/veila/"
          cp -R assets/themes "$dist_dir/share/veila/"
          install -m644 README.md "$dist_dir/README.md"
          install -m644 LICENSE "$dist_dir/LICENSE"

          tar -C dist -czf "dist/veila-${version}-${{ matrix.artifact_arch }}.tar.gz" "veila-${version}-${{ matrix.artifact_arch }}"

      - name: Package Debian package
        shell: bash
        run: |
          set -euxo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
            if [[ ! "$version" =~ ^[0-9] ]]; then
              crate_version="$(awk -F '"' '/^version =/ { print $2; exit }' Cargo.toml)"
              version="${crate_version}~${version}"
            fi
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          DEB_ARCHITECTURE="${{ matrix.deb_arch }}" bash packaging/deb/build-deb.sh "$version" dist

      - name: Package RPM package
        shell: bash
        run: |
          set -euxo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            artifact_version="${{ github.event.inputs.version }}"
            package_version="$artifact_version"
            if [[ ! "$package_version" =~ ^[0-9] ]]; then
              crate_version="$(awk -F '"' '/^version =/ { print $2; exit }' Cargo.toml)"
              package_version="${crate_version}~${package_version}"
            fi
          else
            artifact_version="${GITHUB_REF_NAME#v}"
            package_version="$artifact_version"
          fi
          RPM_ARCHITECTURE="${{ matrix.rpm_arch }}" bash packaging/rpm/build-rpm.sh \
            "$package_version" \
            dist \
            "dist/veila-${artifact_version}-${{ matrix.artifact_arch }}.tar.gz"

      - name: Upload release asset
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/veila-*-${{ matrix.artifact_arch }}.tar.gz
            dist/veila_*_${{ matrix.deb_arch }}.deb
            dist/veila-*.rpm

      - name: Upload manual packaging artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.inputs.artifact_name }}-${{ matrix.artifact_arch }}
          path: |
            dist/veila-*-${{ matrix.artifact_arch }}.tar.gz
            dist/veila_*_${{ matrix.deb_arch }}.deb
            dist/veila-*.rpm
